<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillTrack</title>
    <link rel="styleSheet" href="style.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous"/>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>
<body>
    <div class="header-section">
        <h1 class="header-heading">SkillTrack</h1>
    </div>

    <div class="container-fluid">
        <div class="row g-0">
            <div class="col-12 col-md-9 ">
                <div class="select-role-container">
                    <p class="select-career-para">Select Your Career Path:</p>

                    <select id="selectRole" class="select-role-dropdown">
                        <option value="fullstack">Full Stack Developer</option>
                        <option value="webDev">Web Developer</option>
                        <option value="devops">Devops Engineer</option>
                        <option value="ai/ml">AI/ML</option>
                        <option value="mernstack">Mern Stack Developer</option>
                        <option value="dataAnalyst">Data Analyst</option>
                        <option value="android">Android Developer</option>
                        <option value="uiux">UI/UX Designer</option>
                        <option value="cybersecurity">Cybersecurity</option>
                        <option value="cloud">Cloud Engineer</option>    
                    </select>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <button class="button" id="showButton">Show Roadmap</button>
            </div>
        </div>

    <!---roadmap-section-->
        <div class="row">
            <div class="col-12 mt-5">
                <div id="roadmapContainer">
                    
                </div>
            </div>
        </div>
    
    <!-- daily-learning-section -->
    
        <div class="row g-0">
            <div class="col-12 mt-5 mb-3" id="dailyPlanContainer"></div>
            
        </div>

    <!-- Daily-Plan-card -->
        <div class="row p-3">
            <div class="col-12 mt-3" id="dailyPlanCard" style="display: none;"></div>
            
        </div>
    
    </div>
    
    



    <script src="script.js"></script>
</body>
</html>
